name: Nightly Tasks

on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC

jobs:
  nightly-benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv sync --extra dev
    - name: Run Benchmark Check
      run: ./tools/scripts/benchmark.sh

  nightly-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv sync --extra dev
    - name: Build Docs
      run: uv run mkdocs build
